<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&amp;family=Karla:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: oklch(99% 0.003 60); font-family: 'Karla', sans-serif; }
    a { color: oklch(60% 0.17 40); text-decoration: none; }
    a:hover { color: oklch(50% 0.17 40); }
    * { box-sizing: border-box; }
    ::placeholder { color: oklch(58% 0.01 60); }
  </style>
</helmet>

<div style="width:100%; min-height:100vh; overflow-x:hidden; color: oklch(18% 0.01 40); display:flex; justify-content:center; padding:56px 24px 80px;">
  <div style="width:100%; max-width:900px;">

    <!--=== Bot greeting ===-->
    <div style="text-align:center; margin-bottom:32px;">
      <div style="width:56px; height:56px; border-radius:50%; background:linear-gradient(160deg, oklch(75% 0.17 45), oklch(62% 0.18 35)); display:flex; align-items:center; justify-content:center; margin:0 auto 14px; font-size:26px; box-shadow: 0 8px 18px oklch(65% 0.17 40 / 0.35);">🤖</div>
      <div style="font-family:'Nunito',sans-serif; font-weight:800; font-size:22px; color:oklch(62% 0.18 40);">Good Evening!</div>
      <div style="font-family:'Nunito',sans-serif; font-weight:900; font-size:28px; color:oklch(18% 0.01 40); margin-top:2px;">What sounds good right now?</div>
    </div>

    <!--=== Ask bar ===-->
    <div style="position:relative; margin-bottom:36px;">
      <span style="position:absolute; left:22px; top:50%; transform:translateY(-50%); font-size:18px; color:oklch(55% 0.01 60);">⌕</span>
      <input type="text" placeholder="Ask AI Chef anything food..." style="width:100%; padding:20px 22px 20px 52px; border-radius:20px; border:1px solid oklch(90% 0.005 60); background:oklch(96% 0.005 60); font-size:16px; font-family:'Karla',sans-serif; color:oklch(20% 0.01 40); outline:none;" />
    </div>

    <!--=== Food Mood chips ===-->
    <div style="margin-bottom:36px;">
      <h3 style="font-family:'Nunito',sans-serif; font-weight:800; font-size:16px; margin:0 0 14px;">Food Mood</h3>
      <div style="display:flex; flex-wrap:wrap; gap:10px;">
        <sc-for list="{{ moods }}" as="m" hint-placeholder-count="8">
          <button style="display:flex; align-items:center; gap:8px; padding:10px 18px; border-radius:999px; border:1px solid oklch(90% 0.005 60); background:oklch(97% 0.005 60); font-family:'Karla',sans-serif; font-weight:700; font-size:14.5px; color:oklch(20% 0.01 40); cursor:pointer;" style-hover="background: oklch(94% 0.02 40); border-color: oklch(85% 0.05 40);">
            <span style="font-size:16px;">{{ m.emoji }}</span>{{ m.label }}
          </button>
        </sc-for>
      </div>
    </div>

    <!--=== Quick Discovery ===-->
    <div style="margin-bottom:36px;">
      <h3 style="font-family:'Nunito',sans-serif; font-weight:800; font-size:16px; margin:0 0 14px;">Quick Discovery</h3>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
        <sc-for list="{{ discovery }}" as="d" hint-placeholder-count="8">
          <a href="#" style="display:flex; align-items:center; gap:16px; padding:20px 22px; border-radius:20px; border:1px solid oklch(90% 0.005 60); background:oklch(97% 0.005 60);" style-hover="background: oklch(95% 0.01 60); border-color: oklch(85% 0.02 60);">
            <div style="width:44px; height:44px; min-width:44px; border-radius:14px; background:{{ d.bg }}; display:flex; align-items:center; justify-content:center; font-size:20px;">{{ d.emoji }}</div>
            <span style="font-family:'Nunito',sans-serif; font-weight:800; font-size:15.5px; color:oklch(18% 0.01 40);">{{ d.label }}</span>
          </a>
        </sc-for>
      </div>
    </div>

    <!--=== Quick Links ===-->
    <div>
      <h3 style="font-family:'Nunito',sans-serif; font-weight:800; font-size:16px; margin:0 0 14px;">Quick Links</h3>
      <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:14px;">
        <sc-for list="{{ quickLinks }}" as="q" hint-placeholder-count="3">
          <a href="#" style="display:flex; flex-direction:column; gap:14px; padding:22px; border-radius:20px; border:1px solid oklch(90% 0.005 60); background:oklch(97% 0.005 60);" style-hover="background: oklch(95% 0.01 60);">
            <div style="width:36px; height:36px; border-radius:11px; background:{{ q.bg }}; display:flex; align-items:center; justify-content:center; font-size:17px;">{{ q.emoji }}</div>
            <span style="font-family:'Nunito',sans-serif; font-weight:800; font-size:15px; color:oklch(18% 0.01 40);">{{ q.label }}</span>
          </a>
        </sc-for>
      </div>
    </div>

  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const moods = [
      { emoji: '😊', label: 'Happy' },
      { emoji: '🍲', label: 'Comfort Food' },
      { emoji: '🎉', label: 'Celebrating' },
      { emoji: '☕', label: 'Coffee' },
      { emoji: '🌶️', label: 'Spicy' },
      { emoji: '🍣', label: 'Sushi' },
      { emoji: '🍜', label: 'Ramen' },
      { emoji: '✨', label: 'Surprise Me' },
    ];

    const discovery = [
      { emoji: '📍', label: 'Find Somewhere To Eat', bg: 'oklch(90% 0.06 25)' },
      { emoji: '🍳', label: 'Cook Tonight', bg: 'oklch(90% 0.05 85)' },
      { emoji: '▶️', label: 'Watch Bites', bg: 'oklch(90% 0.06 350)' },
      { emoji: '🎬', label: 'Create a Trim', bg: 'oklch(90% 0.05 150)' },
      { emoji: '🧭', label: 'Explore Nearby', bg: 'oklch(90% 0.05 210)' },
      { emoji: '👥', label: 'Plan With My Crew', bg: 'oklch(90% 0.05 300)' },
      { emoji: '🌍', label: 'Explore A Cuisine', bg: 'oklch(90% 0.05 190)' },
      { emoji: '🎁', label: 'Surprise Me', bg: 'oklch(90% 0.06 40)' },
    ];

    const quickLinks = [
      { emoji: '📍', label: 'Restaurants', bg: 'oklch(90% 0.06 25)' },
      { emoji: '📖', label: 'Recipes', bg: 'oklch(90% 0.05 85)' },
      { emoji: '▶️', label: 'Bites', bg: 'oklch(90% 0.06 350)' },
    ];

    return { moods, discovery, quickLinks };
  }
}

</script>
</body>
</html>
