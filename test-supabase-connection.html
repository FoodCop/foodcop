<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase Connection Test</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <h1>Supabase Connection Test</h1>
    <div id="status">Testing...</div>
    <div id="data"></div>

    <script>
      const supabaseUrl = "https://lgladnskxmbkhcnrsfxv.supabase.co";
      const supabaseKey =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnbGFkbnNreG1ia2hjbnJzZnh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY4NDM3NzUsImV4cCI6MjA3MjQxOTc3NX0.AtM8nHkHpaVCtf8mftnG7yTRKDfpqeIgSGfcogErUv4";

      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      async function testConnection() {
        try {
          console.log("Testing Supabase connection...");

          const { data, error } = await supabase
            .from("public_master_bot_posts")
            .select("*")
            .limit(5);

          if (error) {
            document.getElementById("status").innerHTML =
              "❌ Error: " + error.message;
            console.error("Error:", error);
          } else {
            document.getElementById("status").innerHTML =
              "✅ Connected successfully!";
            document.getElementById("data").innerHTML =
              "<h3>Sample Data:</h3><pre>" +
              JSON.stringify(data, null, 2) +
              "</pre>";
            console.log("Success:", data);
          }
        } catch (err) {
          document.getElementById("status").innerHTML =
            "❌ Exception: " + err.message;
          console.error("Exception:", err);
        }
      }

      testConnection();
    </script>
  </body>
</html>
