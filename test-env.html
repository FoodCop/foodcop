<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Environment Variables Test</title>
  </head>
  <body>
    <h1>Environment Variables Test</h1>
    <div id="results"></div>

    <script type="module">
      // Test if environment variables are accessible
      const results = document.getElementById("results");

      function addResult(label, value, status) {
        const div = document.createElement("div");
        div.innerHTML = `
                <strong>${label}:</strong>
                <span style="color: ${status === "success" ? "green" : "red"}">
                    ${value || "Not found"}
                </span>
            `;
        results.appendChild(div);
      }

      // Test environment variables
      addResult(
        "VITE_GOOGLE_MAPS_API_KEY",
        import.meta.env.VITE_GOOGLE_MAPS_API_KEY,
        import.meta.env.VITE_GOOGLE_MAPS_API_KEY ? "success" : "error"
      );

      addResult(
        "VITE_SUPABASE_URL",
        import.meta.env.VITE_SUPABASE_URL,
        import.meta.env.VITE_SUPABASE_URL ? "success" : "error"
      );

      addResult(
        "VITE_SUPABASE_ANON_KEY",
        import.meta.env.VITE_SUPABASE_ANON_KEY,
        import.meta.env.VITE_SUPABASE_ANON_KEY ? "success" : "error"
      );

      // Test Google Places API
      if (import.meta.env.VITE_GOOGLE_MAPS_API_KEY) {
        addResult(
          "API Key Length",
          import.meta.env.VITE_GOOGLE_MAPS_API_KEY.length,
          "success"
        );
        addResult(
          "API Key Preview",
          import.meta.env.VITE_GOOGLE_MAPS_API_KEY.substring(0, 12) + "...",
          "success"
        );
      }
    </script>
  </body>
</html>
